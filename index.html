<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Web Dev Lab Portfolio</title>

<style>
    body{
        font-family: Arial, sans-serif;
        margin:0;
        background:#0f172a;
        color:white;
    }

    header{
        text-align:center;
        padding:25px;
        background:linear-gradient(135deg,#4f46e5,#9333ea);
    }

    header h1{
        margin:0;
        font-size:32px;
    }

    .container{
        display:flex;
        flex-wrap:wrap;
        padding:20px;
    }

    /* Sidebar */
    .sidebar{
        width:25%;
        min-width:250px;
        background:#111827;
        padding:15px;
        border-radius:10px;
        height:85vh;
        overflow-y:auto;
    }

    .sidebar button{
        width:100%;
        margin:5px 0;
        padding:10px;
        background:#1f2937;
        color:white;
        border:none;
        cursor:pointer;
        border-radius:6px;
        transition:0.3s;
        text-align:left;
    }

    .sidebar button:hover{
        background:#4f46e5;
    }

    /* Content */
    .content{
        flex:1;
        margin-left:20px;
        background:#1e293b;
        padding:20px;
        border-radius:10px;
        min-height:85vh;
    }

    iframe{
        width:100%;
        height:75vh;
        border:none;
        border-radius:10px;
        background:white;
    }

    .title{
        font-size:20px;
        margin-bottom:10px;
        color:#38bdf8;
    }

</style>
</head>

<body>

<header>
    <h1>Web Development Lab Portfolio</h1>
    <p>Sejal Shivaji Kumbhar - CSE SY</p>
</header>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <button onclick="loadExp('exp1.html','Experiment 1 - study of web technology basic)">Experiment 1 study of web technology basics-</button>
        <button onclick="loadExp('exp2.html','Experiment 2 - Create a static web page')">Experiment 2 - create a static web page</button>
        <button onclick="loadExp('exp3.html','Experiment 3 - use of list tags in html)">Experiment 3 -use of list tags in html</button>
        <button onclick="loadExp('exp4.html','Experiment 4 - insert images using html')">Experiment 4 - insert images using html</button>
        <button onclick="loadExp('exp5.html','Experiment 5 - create frames using html')">Experiment 5 - create frames using html</button>
        <button onclick="loadExp('exp6.html','Experiment 6 - demonstrate link tags in html)">Experiment 6 -demonstrate link tags in html</button>
        <button onclick="loadExp('exp7.html','Experiment 7 - demonstrate list tags in html)">Experiment 7 - demonstrate list tags in html</button>
        <button onclick="loadExp('exp8.html','Experiment 8 - employee registration form)">Experiment 8 - employee registration form</button>
        <button onclick="loadExp('exp9.html','Experiment 9 - resume webpage using html')">Experiment 9 - resume webpage using html</button>
        <button onclick="loadExp('exp10.html','Experiment 10 - study and implementation of xml)">Experiment 10 -study and implementation of xml</button>
        <button onclick="loadExp('exp11.html','Experiment 11 -XSLT transformation into XML)">Experiment 11 - XSLT transformation into XML</button>
        <button onclick="loadExp('exp12.html','Experiment 12 -Student application using XSLT)">Experiment 12 -Student application using XSLT</button>
        <button onclick="loadExp('exp13.html','Experiment 13 - XSLT with conditional statement)">Experiment 13 - XSLT with conditional statement</button>
        <button onclick="loadExp('exp1.html','Experiment 1 - open main homepage of project)">Experiment 14 -open main homepage of project</button>
    </div>

    <!-- CONTENT -->
    <div class="content">
        <div class="title" id="title">Select an Experiment</div>

        <iframe id="frame" src=""></iframe>
    </div>

</div>

<script>
    function loadExp(page, title){
        document.getElementById("frame").src = page;
        document.getElementById("title").innerText = title;
    }
</script>

</body>
</html>
