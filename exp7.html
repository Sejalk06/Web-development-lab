<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Experiment 6 - Link Tags in HTML</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#2563eb,#7c3aed,#06b6d4);
            color:white;
        }

        .container{
            width:80%;
            max-width:700px;
            background:rgba(255,255,255,0.1);
            padding:40px;
            border-radius:20px;
            backdrop-filter:blur(10px);
            box-shadow:0 0 25px rgba(0,0,0,0.3);
            text-align:center;
        }

        h1{
            margin-bottom:20px;
            color:#fff;
            font-size:38px;
        }

        p{
            font-size:18px;
            margin-bottom:30px;
            line-height:1.7;
        }

        .links{
            display:flex;
            flex-direction:column;
            gap:20px;
        }

        .links a{
            text-decoration:none;
            background:white;
            color:#2563eb;
            padding:15px;
            border-radius:30px;
            font-size:18px;
            font-weight:bold;
            transition:0.3s;
        }

        .links a:hover{
            transform:scale(1.05);
            background:#0f172a;
            color:white;
            box-shadow:0 0 20px #38bdf8;
        }

        .back{
            margin-top:35px;
        }

        .back a{
            text-decoration:none;
            color:white;
            background:#0f172a;
            padding:12px 25px;
            border-radius:30px;
            font-weight:bold;
        }

        .back a:hover{
            background:white;
            color:#2563eb;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>🔗 Experiment 6</h1>

    <p>
        This experiment demonstrates the use of link tags in HTML.
        Hyperlinks are created using the anchor (&lt;a&gt;) tag.
    </p>

    <div class="links">

        <a href="https://www.google.com" target="_blank">
            🌐 Open Google
        </a>

        <a href="https://www.youtube.com" target="_blank">
            ▶ Open YouTube
        </a>

        <a href="https://github.com" target="_blank">
            💻 Open GitHub
        </a>

    </div>

    <div class="back">
        <a href="index.html">⬅ Back to Home</a>
    </div>

</div>

</body>
</html>
